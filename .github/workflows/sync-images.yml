name: Sync Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      resync_all:
        description: "Force full re-sync of all enabled images"
        required: false
        default: false
        type: boolean
      cli_version:
        description: "CLI release tag to use (for example v0.1.0). Leave empty to use latest."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  sync:
    name: Sync images via CLI
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up skopeo
        uses: warjiang/setup-skopeo@v0.1.3
        with:
          version: latest

      - name: Download released CLI binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_version || '' }}
        run: |
          set -euo pipefail

          if [ -z "${CLI_VERSION}" ]; then
            CLI_VERSION=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName)
          fi

          ASSET_NAME=$(gh release view "$CLI_VERSION" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' \
            | grep -E '^MirrorPilot_.*_linux_(x86_64|amd64)\.tar\.gz$' \
            | head -n1)

          if [ -z "${ASSET_NAME}" ]; then
            echo "No Linux amd64 release asset found for tag ${CLI_VERSION}" >&2
            exit 1
          fi

          mkdir -p bin
          gh release download "$CLI_VERSION" --repo "$GITHUB_REPOSITORY" -p "$ASSET_NAME" -D /tmp
          tar -xzf "/tmp/${ASSET_NAME}" -C bin mirrorpilot
          chmod +x bin/mirrorpilot

      - name: Validate config
        run: ./bin/mirrorpilot --config ./mirrorpilot.yaml validate

      - name: Sync images
        env:
          DEST_REGISTRY_USER: ${{ secrets.DEST_REGISTRY_USER != '' && secrets.DEST_REGISTRY_USER || secrets.ALIYUN_REGISTRY_USER }}
          DEST_REGISTRY_PASSWORD: ${{ secrets.DEST_REGISTRY_PASSWORD != '' && secrets.DEST_REGISTRY_PASSWORD || secrets.ALIYUN_REGISTRY_PASSWORD }}
          RESYNC_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.resync_all || false }}
        run: |
          args=""
          if [ "$RESYNC_ALL" = "true" ]; then
            args="--all"
          fi
          ./bin/mirrorpilot --config ./mirrorpilot.yaml sync $args

      - name: Commit sync status
        run: |
          rm -f skopeo

          changed_config_files=$(git diff --name-only -- mirrorpilot.yaml sync-images.yaml)
          if [ -z "$changed_config_files" ]; then
            echo "No status changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $changed_config_files
          if git diff --cached --quiet; then
            echo "No staged config changes after git add, skip commit"
            git status --short
            exit 0
          fi
          git commit -m "chore(ci): update sync status [skip ci]"
          git push
