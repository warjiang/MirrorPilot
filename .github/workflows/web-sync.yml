name: Web Sync

on:
  repository_dispatch:
    types: [web-sync]

jobs:
  sync:
    name: Sync images from Web UI
    runs-on: ubuntu-latest
    env:
      WEB_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL != '' && secrets.WEB_API_BASE_URL || 'https://mirrotpilot.20220625.xyz' }}
      SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
    steps:
      - name: Parse payload
        id: parse
        run: |
          echo '${{ toJSON(github.event.client_payload.images) }}' > /tmp/images.json
          IMAGE_COUNT=$(jq 'length' /tmp/images.json)
          echo "image_count=$IMAGE_COUNT" >> $GITHUB_OUTPUT
          echo "Received $IMAGE_COUNT images to sync:"
          jq '.[].source' /tmp/images.json

      - name: Set up skopeo
        if: steps.parse.outputs.image_count != '0'
        uses: warjiang/setup-skopeo@v0.1.3

      - name: Sync images
        if: steps.parse.outputs.image_count != '0'
        run: |
          echo '[]' > /tmp/results.json

          jq -c '.[]' /tmp/images.json | while IFS= read -r img; do
            IMAGE_ID=$(echo "$img" | jq -r '.id')
            SOURCE=$(echo "$img" | jq -r '.source')
            TARGET=$(echo "$img" | jq -r '.target')
            REGISTRY=$(echo "$img" | jq -r '.registry // empty')
            USERNAME=$(echo "$img" | jq -r '.username // empty')
            PASSWORD=$(echo "$img" | jq -r '.password // empty')

            if [ -n "$REGISTRY" ]; then
              FULL_TARGET="${REGISTRY}/${TARGET}"
            else
              FULL_TARGET="${TARGET}"
            fi

            echo "::group::Syncing $SOURCE -> $FULL_TARGET"

            DEST_CREDS_ARG=""
            if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
              DEST_CREDS_ARG="--dest-creds ${USERNAME}:${PASSWORD}"
            fi

            if skopeo copy --all \
              $DEST_CREDS_ARG \
              "docker://${SOURCE}" \
              "docker://${FULL_TARGET}"; then
              echo "✅ Success"
              jq --argjson id "$IMAGE_ID" '. + [{"image_id": $id, "success": true}]' /tmp/results.json > /tmp/results_new.json
              mv /tmp/results_new.json /tmp/results.json
            else
              ERROR="skopeo copy failed for ${SOURCE}"
              echo "❌ Failed: $ERROR"
              jq --argjson id "$IMAGE_ID" --arg err "$ERROR" '. + [{"image_id": $id, "success": false, "error": $err}]' /tmp/results.json > /tmp/results_new.json
              mv /tmp/results_new.json /tmp/results.json
            fi

            echo "::endgroup::"
          done

          echo "Results:"
          cat /tmp/results.json | jq .

      - name: Report results
        if: always() && steps.parse.outputs.image_count != '0'
        run: |
          if [ ! -s /tmp/results.json ] || [ "$(cat /tmp/results.json)" = "[]" ]; then
            jq '[.[] | {image_id: .id, success: false, error: "sync step failed"}]' /tmp/images.json > /tmp/results.json
          fi

          echo "Reporting results to API:"
          cat /tmp/results.json | jq .

          curl -sf -X POST \
            -H "Authorization: Bearer $SYNC_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"results\": $(cat /tmp/results.json)}" \
            "$WEB_API_BASE_URL/api/sync/complete"
