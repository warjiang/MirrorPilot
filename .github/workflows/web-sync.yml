name: Web Sync

on:
  repository_dispatch:
    types: [web-sync]

jobs:
  sync:
    name: Sync images from Web UI
    runs-on: ubuntu-latest
    env:
      WEB_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL != '' && secrets.WEB_API_BASE_URL || 'https://mirrotpilot.20220625.xyz' }}
      SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
      JOB_ID: ${{ github.event.client_payload.job_id }}
    steps:
      - name: Report start
        if: env.JOB_ID != ''
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $SYNC_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"run_id\": ${{ github.run_id }}}" \
            "$WEB_API_BASE_URL/api/sync/jobs/$JOB_ID/start" || echo "::warning::Failed to report job start"

      - name: Parse payload
        id: parse
        run: |
          echo '${{ toJSON(github.event.client_payload.images) }}' > /tmp/images.json
          IMAGE_COUNT=$(jq 'length' /tmp/images.json)
          echo "image_count=$IMAGE_COUNT" >> $GITHUB_OUTPUT
          echo "Received $IMAGE_COUNT images to sync:"
          jq '.[].source' /tmp/images.json

      - name: Set up skopeo
        if: steps.parse.outputs.image_count != '0'
        uses: warjiang/setup-skopeo@v0.1.3

      - name: Sync images
        if: steps.parse.outputs.image_count != '0'
        run: |
          report_event() {
            local payload="$1"
            if [ -n "$JOB_ID" ]; then
              curl -sf -X POST \
                -H "Authorization: Bearer $SYNC_SECRET" \
                -H "Content-Type: application/json" \
                -d "{\"events\": [$payload]}" \
                "$WEB_API_BASE_URL/api/sync/jobs/$JOB_ID/events" || echo "::warning::Failed to report event"
            fi
          }

          jq -c '.[]' /tmp/images.json | while IFS= read -r img; do
            IMAGE_ID=$(echo "$img" | jq -r '.id')
            SOURCE=$(echo "$img" | jq -r '.source')
            TARGET=$(echo "$img" | jq -r '.target')
            REGISTRY=$(echo "$img" | jq -r '.registry // empty')
            USERNAME=$(echo "$img" | jq -r '.username // empty')
            PASSWORD=$(echo "$img" | jq -r '.password // empty')

            if [ -n "$REGISTRY" ]; then
              FULL_TARGET="${REGISTRY}/${TARGET}"
            else
              FULL_TARGET="${TARGET}"
            fi

            echo "::group::Syncing $SOURCE -> $FULL_TARGET"

            DEST_CREDS_ARG=""
            if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
              DEST_CREDS_ARG="--dest-creds ${USERNAME}:${PASSWORD}"
            fi

            START_MS=$(date +%s%3N)
            SKOPEO_OUTPUT=$(skopeo copy --all \
              $DEST_CREDS_ARG \
              "docker://${SOURCE}" \
              "docker://${FULL_TARGET}" 2>&1) && SKOPEO_RC=0 || SKOPEO_RC=$?

            DURATION_MS=$(( $(date +%s%3N) - START_MS ))
            if [ "$SKOPEO_RC" -eq 0 ]; then
              echo "✅ Success (${DURATION_MS}ms)"
              report_event "{\"image_id\": $IMAGE_ID, \"success\": true, \"duration_ms\": $DURATION_MS}"
            else
              # Extract meaningful error from skopeo output
              LAST_LINE=$(echo "$SKOPEO_OUTPUT" | grep -i "level=fatal\|error\|unauthorized\|denied\|forbidden" | tail -1)
              if echo "$LAST_LINE" | grep -qi "insufficient scopes"; then
                ERROR="Token 权限不足，请到 Docker Hub 重新生成 Access Token 并选择 Read & Write 权限"
              elif echo "$LAST_LINE" | grep -qi "unauthorized\|invalid username"; then
                ERROR="认证失败，请检查用户名和密码/Token 是否正确"
              elif echo "$LAST_LINE" | grep -qi "denied\|forbidden"; then
                ERROR="访问被拒绝，请确认目标仓库存在且有推送权限"
              elif [ -n "$LAST_LINE" ]; then
                # Strip timestamp prefix from skopeo fatal messages
                ERROR=$(echo "$LAST_LINE" | sed 's/^time="[^"]*" level=fatal msg="//;s/"$//')
              else
                ERROR="skopeo copy failed for ${SOURCE}"
              fi
              echo "$SKOPEO_OUTPUT"
              echo "❌ Failed: $ERROR"
              ERROR_JSON=$(jq -n --arg err "$ERROR" '$err')
              report_event "{\"image_id\": $IMAGE_ID, \"success\": false, \"error\": $ERROR_JSON, \"duration_ms\": $DURATION_MS}"
            fi

            echo "::endgroup::"
          done

      - name: Report completion
        if: always() && env.JOB_ID != ''
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $SYNC_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$WEB_API_BASE_URL/api/sync/jobs/$JOB_ID/complete" || echo "::warning::Failed to report completion"
