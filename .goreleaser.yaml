version: 2

project_name: MirrorPilot

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mirrorpilot
    main: ./cmd/mirrorpilot
    binary: mirrorpilot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
